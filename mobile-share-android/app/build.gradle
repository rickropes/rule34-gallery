plugins {
    id 'com.android.application'
}

android {
    namespace 'com.gallery.mobilequeue'
    compileSdk 35

    defaultConfig {
        applicationId 'com.gallery.mobilequeue'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // Worker, WorkManager, Data, Constraints, and ExistingWorkPolicy.
    implementation 'androidx.work:work-runtime:2.9.1'

    // Explicit because QueueUploadWorker uses @NonNull in its public API.
    implementation 'androidx.annotation:annotation:1.8.2'
}

task prepareKotlinBuildScriptModel {

}